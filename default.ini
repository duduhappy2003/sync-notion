[DEFAULT]

[weread.format]
ContentType = list 
EnableEmoj = false
EnableReadingDetail = true

[trending.language]
Languages = typescript,go,python,swift
MinStargazers = 100
MinForks = 100
MinWatchers = 100

#[memos.opts]
#MemosHost = http://127.0.0.1:8081
#MemosUserName = memos-demo

[memos.opts]
MemosHost = ${{ secrets.MEMOS_HOST }}
MemosUserName = ${{ secrets.MEMOS_USERNAME }}

[producthunt.filter]
MinVotes = 10
MinComments = 10
